<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BBC Micro — Emu198x</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #ccc; }
        canvas { image-rendering: pixelated; border: 2px solid #333; }
        p { margin-top: 1em; font-size: 0.9em; }
    </style>
</head>
<body>
    <input type="file" id="rom" accept=".bin,.rom">
    <canvas id="screen"></canvas>
    <p>Load MOS ROM. Keys: full keyboard, arrows, Shift, Ctrl, Escape</p>
    <script type="module">
        import init, { BbcMicroEmulator } from './pkg/emu_bbc_micro_wasm.js';
        const SCALE = 2;
        async function start() {
            const wasm = await init();
            document.getElementById('rom').addEventListener('change', async (e) => {
                const rom = new Uint8Array(await e.target.files[0].arrayBuffer());
                run(wasm, rom);
            });
        }
        function run(wasm, rom) {
            const emu = new BbcMicroEmulator(rom);
            const canvas = document.getElementById('screen');
            const width = emu.width(), height = emu.height();
            canvas.width = width; canvas.height = height;
            canvas.style.width = `${width * SCALE}px`; canvas.style.height = `${height * SCALE}px`;
            const ctx = canvas.getContext('2d');
            let audioCtx = null, nextAudioTime = 0;
            canvas.addEventListener('click', () => { if (!audioCtx) { audioCtx = new AudioContext({ sampleRate: 48000 }); nextAudioTime = audioCtx.currentTime; } audioCtx.resume(); canvas.focus(); });
            document.addEventListener('keydown', (e) => { e.preventDefault(); emu.key_down(e.code); });
            document.addEventListener('keyup', (e) => { e.preventDefault(); emu.key_up(e.code); });
            const FRAME_DURATION = 1000 / 50;
            let lastTime = 0, accumulator = 0;
            function loop(timestamp) {
                if (lastTime === 0) lastTime = timestamp;
                accumulator += timestamp - lastTime; lastTime = timestamp;
                while (accumulator >= FRAME_DURATION) { emu.run_frame(); if (audioCtx) { const len = emu.audio_buffer_len(); if (len > 0) { const samples = new Float32Array(wasm.memory.buffer, emu.audio_buffer_ptr(), len); const buffer = audioCtx.createBuffer(1, len, 48000); buffer.getChannelData(0).set(samples); const source = audioCtx.createBufferSource(); source.buffer = buffer; source.connect(audioCtx.destination); if (nextAudioTime < audioCtx.currentTime) nextAudioTime = audioCtx.currentTime; source.start(nextAudioTime); nextAudioTime += len / 48000; } } accumulator -= FRAME_DURATION; }
                const rgba = new Uint8ClampedArray(wasm.memory.buffer, emu.framebuffer_rgba_ptr(), width * height * 4);
                ctx.putImageData(new ImageData(rgba, width, height), 0, 0);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }
        start().catch(console.error);
    </script>
</body>
</html>
