[package]
name = "emu-msx"
description = "MSX1 home computer emulator"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "emu-msx"
path = "src/main.rs"

[lib]
name = "emu_msx"
path = "src/lib.rs"

[dependencies]
emu-core = { path = "../emu-core", features = ["renderer"] }
zilog-z80 = { path = "../zilog-z80" }
ti-tms9918 = { path = "../ti-tms9918" }
gi-ay-3-8910 = { path = "../gi-ay-3-8910" }
intel-8255 = { path = "../intel-8255" }
winit = "0.30"
muda = "0.16"
png = "0.17"

[lints]
workspace = true
