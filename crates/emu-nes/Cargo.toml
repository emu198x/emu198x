[package]
name = "emu-nes"
description = "Cycle-accurate NES emulator"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "emu-nes"
path = "src/main.rs"

[lib]
name = "emu_nes"
path = "src/lib.rs"

[dependencies]
emu-core = { path = "../emu-core", features = ["mcp", "video", "renderer"] }
mos-6502 = { path = "../mos-6502" }
nes-cartridge = { path = "../nes-cartridge" }
ricoh-apu-2a03 = { path = "../ricoh-apu-2a03" }
ricoh-ppu-2c02 = { path = "../ricoh-ppu-2c02" }
winit = "0.30"
muda = "0.16"
png = "0.17"
hound = "3.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"

[lints]
workspace = true
