[package]
name = "emu-spectrum"
description = "Cycle-accurate ZX Spectrum emulator"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "emu-spectrum"
path = "src/main.rs"

[lib]
name = "emu_spectrum"
path = "src/lib.rs"

[features]
default = ["native"]
native = ["emu-core/mcp", "emu-core/video", "emu-core/renderer", "dep:winit", "dep:muda", "dep:png", "dep:hound", "dep:serde", "dep:serde_json", "dep:base64"]

[dependencies]
emu-core = { path = "../emu-core" }
zilog-z80 = { path = "../zilog-z80" }
sinclair-ula = { path = "../sinclair-ula" }
gi-ay-3-8910 = { path = "../gi-ay-3-8910" }
nec-upd765 = { path = "../nec-upd765" }
format-spectrum-bas = { path = "../format-spectrum-bas" }
format-spectrum-tap = { path = "../format-spectrum-tap" }
format-tzx = { path = "../format-tzx" }
format-sna = { path = "../format-sna" }
format-z80 = { path = "../format-z80" }
winit = { version = "0.30", optional = true }
muda = { version = "0.16", optional = true }
png = { version = "0.17", optional = true }
hound = { version = "3.5", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
base64 = { version = "0.22", optional = true }

[lints]
workspace = true
