[package]
name = "machine-amiga"
version = "0.1.0"
edition = "2024"

[dependencies]
emu-core = { path = "../emu-core", features = ["mcp", "video"] }
motorola-68000 = { path = "../motorola-68000" }
mos-cia-8520 = { path = "../mos-cia-8520" }
commodore-paula-8364 = { path = "../commodore-paula-8364" }
commodore-agnus-ocs = { path = "../commodore-agnus-ocs" }
commodore-denise-ocs = { path = "../commodore-denise-ocs" }
commodore-agnus-ecs = { path = "../commodore-agnus-ecs" }
commodore-denise-ecs = { path = "../commodore-denise-ecs" }
commodore-agnus-aga = { path = "../commodore-agnus-aga" }
commodore-denise-aga = { path = "../commodore-denise-aga" }
format-adf = { path = "../format-adf" }
drive-amiga-floppy = { path = "../drive-amiga-floppy" }
format-ipf = { path = "../format-ipf" }
peripheral-amiga-keyboard = { path = "../peripheral-amiga-keyboard" }
commodore-gayle = { path = "../commodore-gayle" }
commodore-dmac-390537 = { path = "../commodore-dmac-390537" }
commodore-fat-gary = { path = "../commodore-fat-gary" }
commodore-ramsey = { path = "../commodore-ramsey" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
png = "0.17"
hound = "3.5"

[dev-dependencies]

[lib]
name = "machine_amiga"
path = "src/lib.rs"
