[package]
name = "motorola-68000"
description = "Cycle-accurate Motorola 68000 CPU emulator"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
emu-core = { path = "../emu-core" }

[dev-dependencies]
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }

[lib]
name = "motorola_68000"
path = "src/lib.rs"
