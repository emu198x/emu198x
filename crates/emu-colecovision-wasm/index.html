<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ColecoVision — Emu198x</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #ccc; }
        canvas { image-rendering: pixelated; border: 2px solid #333; }
        p { margin-top: 1em; font-size: 0.9em; }
        label { margin-bottom: 0.5em; }
    </style>
</head>
<body>
    <label>BIOS ROM: <input type="file" id="bios" accept=".bin,.rom"></label>
    <label>Cart ROM: <input type="file" id="cart" accept=".col,.bin,.rom"></label>
    <canvas id="screen"></canvas>
    <p>Load BIOS + cartridge. Arrows=D-pad, Z=Left button, X=Right button, 0-9=Keypad</p>
    <script type="module">
        import init, { ColecoVisionEmulator } from './pkg/emu_colecovision_wasm.js';

        const SCALE = 3;
        let biosData = null, cartData = null;

        async function start() {
            const wasm = await init();

            document.getElementById('bios').addEventListener('change', async (e) => {
                biosData = new Uint8Array(await e.target.files[0].arrayBuffer());
                if (biosData && cartData) run(wasm, biosData, cartData);
            });
            document.getElementById('cart').addEventListener('change', async (e) => {
                cartData = new Uint8Array(await e.target.files[0].arrayBuffer());
                if (biosData && cartData) run(wasm, biosData, cartData);
            });
        }

        function run(wasm, bios, cart) {
            const emu = new ColecoVisionEmulator(bios, cart);
            const canvas = document.getElementById('screen');
            const width = emu.width(), height = emu.height();
            canvas.width = width; canvas.height = height;
            canvas.style.width = `${width * SCALE}px`; canvas.style.height = `${height * SCALE}px`;
            const ctx = canvas.getContext('2d');

            let audioCtx = null, nextAudioTime = 0;
            canvas.addEventListener('click', () => { if (!audioCtx) { audioCtx = new AudioContext({ sampleRate: 48000 }); nextAudioTime = audioCtx.currentTime; } audioCtx.resume(); canvas.focus(); });
            document.addEventListener('keydown', (e) => { e.preventDefault(); emu.key_down(e.code); });
            document.addEventListener('keyup', (e) => { e.preventDefault(); emu.key_up(e.code); });

            const FRAME_DURATION = 1000 / 60;
            let lastTime = 0, accumulator = 0;
            function loop(timestamp) {
                if (lastTime === 0) lastTime = timestamp;
                accumulator += timestamp - lastTime; lastTime = timestamp;
                while (accumulator >= FRAME_DURATION) {
                    emu.run_frame();
                    if (audioCtx) { const len = emu.audio_buffer_len(); if (len > 0) { const samples = new Float32Array(wasm.memory.buffer, emu.audio_buffer_ptr(), len); const buffer = audioCtx.createBuffer(1, len, 48000); buffer.getChannelData(0).set(samples); const source = audioCtx.createBufferSource(); source.buffer = buffer; source.connect(audioCtx.destination); if (nextAudioTime < audioCtx.currentTime) nextAudioTime = audioCtx.currentTime; source.start(nextAudioTime); nextAudioTime += len / 48000; } }
                    accumulator -= FRAME_DURATION;
                }
                const rgba = new Uint8ClampedArray(wasm.memory.buffer, emu.framebuffer_rgba_ptr(), width * height * 4);
                ctx.putImageData(new ImageData(rgba, width, height), 0, 0);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        start().catch(console.error);
    </script>
</body>
</html>
